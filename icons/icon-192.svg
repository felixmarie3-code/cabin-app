<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="42" fill="#181A3B"/>
  <!-- Simplified airplane silhouette -->
  <g transform="translate(96,88)">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="52" ry="8" fill="#52A7BE" opacity="0.2"/>
    <!-- Wings -->
    <path d="M-12,-4 L-48,18 L-44,20 L-8,4 Z" fill="#52A7BE" opacity="0.35"/>
    <path d="M12,-4 L48,18 L44,20 L8,4 Z" fill="#52A7BE" opacity="0.35"/>
    <!-- Body -->
    <path d="M-6,6 L0,-36 L6,6 Z" fill="white" opacity="0.9"/>
    <!-- Tail -->
    <path d="M-4,-30 L0,-42 L4,-30" fill="#52A7BE" opacity="0.6"/>
  </g>
  <!-- CABIN text -->
  <text x="96" y="136" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="6" opacity="0.95">CABIN</text>
  <!-- Neoline -->
  <line x1="46" y1="148" x2="146" y2="148" stroke="#DA3D32" stroke-width="2.5" stroke-linecap="round"/>
</svg>
